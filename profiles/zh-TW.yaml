# Localization Profile: zh-TW（台灣繁體中文）
#
# 供 Phase 3 撰寫與 Phase 4.4 在地化校準時參照。
# 本 profile 定義台灣讀者習慣的用語、標點、文化語境與風格偏好。
#
# 貢獻新語系時請複製本檔為 profiles/<locale>.yaml 並依該地區習慣調整。

locale: zh-TW
name: 台灣繁體中文
description: 適用於台灣讀者的用語與文風規範。

# ── 用語轉換（大陸/通用 → 台灣慣用）────────────────────────────────

term_conversions:
  # 科技 / 軟體
  信息: 資訊
  軟件: 軟體
  硬件: 硬體
  網絡: 網路
  視頻: 影片
  音頻: 音訊
  博客: 部落格
  公眾號: 專頁
  鏈接: 連結
  服務器: 伺服器
  客戶端: 用戶端
  數據庫: 資料庫
  代碼: 程式碼
  編程: 程式設計
  程序: 程式
  程序員: 工程師
  算法: 演算法
  人工智能: 人工智慧
  機器學習: 機器學習     # 兩岸相同
  深度學習: 深度學習     # 兩岸相同
  雲計算: 雲端運算
  大數據: 大數據         # 台灣亦通用

  # 一般
  質量: 品質
  內存: 記憶體
  屏幕: 螢幕
  桌面: 桌面              # 兩岸相同
  鼠標: 滑鼠
  打印機: 印表機
  文件: 檔案
  文件夾: 資料夾
  下載: 下載              # 兩岸相同
  登錄: 登入
  注冊: 註冊
  賬號: 帳號
  密碼: 密碼              # 兩岸相同
  默認: 預設
  選項: 選項              # 兩岸相同
  設置: 設定
  菜單: 選單
  界面: 介面
  用戶: 使用者
  用戶體驗: 使用者體驗

  # 商業 / 金融
  打車: 叫車
  網約車: 叫車平台
  外賣: 外送
  快遞: 宅配
  項目: 專案
  創業: 創業               # 兩岸相同
  風投: 創投
  A 輪: A 輪

  # 生活
  視頻通話: 視訊通話
  電腦: 電腦               # 兩岸相同
  筆記本: 筆電
  手機: 手機               # 兩岸相同
  彩信: 多媒體簡訊
  短信: 簡訊

# ── 用語需依語境判斷（不強制替換）──────────────────────────────────

term_conversions_context_sensitive:
  # 「數據」在台灣也通用，但在某些語境下改為「資料」更自然。
  # 例：`資料分析`、`資料驅動`；但「大數據」「數據科學」仍常用「數據」。
  數據:
    prefer: 數據
    context_rules:
      - if_followed_by: [分析, 處理, 驅動, 集, 庫]
        use: 資料

# ── 標點符號 ─────────────────────────────────────────────────────

punctuation:
  # 一律使用全形中文標點
  require_fullwidth: true
  allowed:
    - "，"
    - "。"
    - "、"
    - "；"
    - "："
    - "「"
    - "」"
    - "『"
    - "』"
    - "（"
    - "）"
    - "——"
    - "……"
    - "？"
    - "！"
  disallowed_in_text:
    - ","   # 半形逗號
    - "."   # 半形句號
    - "!"   # 半形驚嘆號
    - "?"   # 半形問號（程式碼區塊例外）
  exceptions:
    - 英文原文引述可保留原標點
    - 程式碼、檔名、URL、API 名稱保留半形標點
    - 數字、日期、西元年等保留半形

# ── 文風偏好 ─────────────────────────────────────────────────────

style:
  # 避免翻譯腔
  avoid_translationese:
    - 被…所…          # 例：「被市場所影響」→「受市場影響」
    - 進行一個…的動作   # 例：「進行一個分析的動作」→「分析」
    - 做出一個…的決定   # 例：「做出一個選擇的決定」→「做出選擇」
    - 作為一個…         # 過度使用
    - 就像…一樣的 X     # 冗贅

  # 避免過度口語或過度學術
  tone: 自然、清晰，介於商業書與知識普及書之間

  # 段落長度
  paragraph:
    max_chars: 150     # 超過建議拆段

  # 數字與單位
  numerals:
    # 台灣讀者熟悉的慣用量級與單位
    currency_primary: TWD
    currency_reference: USD   # 提及金額時補充新台幣或美元對照
    measurement: metric       # 公制為主

  # 日期格式
  date_format: 西元年/月/日    # 例：2026/04/18

# ── 文化語境 ─────────────────────────────────────────────────────

cultural_context:
  # 涉及案例與比喻時，優先考量台灣讀者熟悉的情境
  prefer_local_examples: true
  notes:
    - 提及政府機關時用台灣對應機關（例：FTC → 公平會）
    - 教育制度：台灣為 6-3-3-4 制
    - 稅制：簡要對照台灣稅制
    - 退休金 / 勞保 / 健保 — 使用台灣制度名稱
    - 若原始案例為美國／中國特有，補充台灣類比或說明

# ── 敘事視角提示 ─────────────────────────────────────────────────

narrative_hints:
  - 避免「做為一個讀者」這類贅詞
  - 使用「我們」建立與讀者的連結，但不過度
  - 直述句多於被動句
  - 適度使用「例如」「比方說」帶入案例

# ── 常見錯譯提醒 ─────────────────────────────────────────────────

common_mistranslations:
  leverage: 槓桿 / 善用（視語境）
  stakeholder: 利害關係人
  framework: 框架 / 架構
  ecosystem: 生態系
  insight: 洞見 / 洞察
  narrative: 敘事 / 敘述
  mindset: 心態 / 思維
  context: 脈絡 / 語境 / 情境
  bias: 偏誤（行為經濟學常用譯法）
